<!DOCTYPE html>
<html>
    <head>
        <title>Result</title>
    </head>

    <body>

        <h2>Result</h2>

        <div style="text-align: center;">
            <img src="data:image/png;base64,{{ plot_url }}" style="max-width: 100%; border-radius: 8px;">
        </div>

        <p><b>Score: </b>{{score}}</p>
        <p><b>Main Issue: </b>{{main_issue}}</p>

        <h3>Analysis: </h3>
        <ul>
            {% for a in analysis %}
                <li>{{a}}</li>
            {% endfor %}
        </ul>

        <h3>Recommendation: </h3>
        <ul>
            {% for r in recommendation %}
                <li>{{r}}</li>
            {% endfor %}
        </ul>

        <h3>Finalize: </h3>
        <ul>
            <li>{{recs}}</li>
        </ul>

        <a href ="/">Go Back</a>
        
    </body>
</html>
