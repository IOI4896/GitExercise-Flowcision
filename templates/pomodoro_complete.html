<!DOCTYPE html>
<html>
    <head>
        <title>Flowcision - Pomodoro Complete</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                color: #333;
            }
            .container {
                background: white;
                padding: 40px;
                border-radius: 20px;
                box-shadow: 0 15px 35px rgba(0,0,0,0.2);
                width: 100%;
                max-width: 500px;
                text-align: center;
            }
            h1 { color: #4a4a4a; font-size: 35px; text-align: center; margin-bottom: 10px; }
            h2 { color: #4a4a4a; font-size: 30px; text-align: center; margin-bottom: 10px; }
            p { color: #667eea; font-size: 24px; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-top: 20px; }
            #timer {
                font-size: 70px;
                margin: 30px;
                color: #e53935
            }
            button {
                width: 100%;
                padding: 15px;
                background-color: #667eea;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                margin-top: 25px;
                transition: 0.3s;
            }
            button:hover { background-color: #5a67d8; transform: translateY(-2px); }
        </style>
    </head>

    <body>
        <div class = "container">
            <h1>🥳 Pomodoro Completed 🎉</h1>
            <p>You did great, keep it up!</p>

            <h2>Total Points: {{points}}</h2>

            <nav>
                <a href = "/pomodoro">
                    <button>Go Back</button>
                </a>

                <a href = "/index">
                    <button>Run Simulation</button>
                </a>
            </nav>
        </div>

        <script>
            const HOTKEYS = {
                back: "{{back_hotkey or 'z'}}"
            }
            document.addEventListener("keydown", 
                function(e){
                    try {
                        const tag = document.activeElement.tagName;
                        if(tag === "INPUT" ||
                            tag === "TEXTAREA" ||
                            tag === "SELECT"
                        ){ 
                            return;
                        };
                        const key = e.key.toLowerCase();
                        if(key === HOTKEYS.back.toLowerCase()){
                            window.location.href = "/";
                        }

                    } catch(err) {
                        console.error("Hotkey Error: ", err);
                    }
                }
            );
        </script>
    </body>
</html>
