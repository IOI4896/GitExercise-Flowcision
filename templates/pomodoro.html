<!DOCTYPE html>
<html>
    <head>
        <title>Flowcision - Pomodoro</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                /* 默认专注态深蓝 */
                background: #1a237e; 
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                color: #333;
                transition: background 0.5s ease;
            }
            
            /* 状态背景色 */
            body.state-focus { background: #1a237e; }
            body.state-break { background: #2e7d32; }
            body.state-pause { background: #e65100; }
            
            /* 深色模式下的状态背景色 */
            body.dark-mode.state-focus { background: #0d113a; }
            body.dark-mode.state-break { background: #123314; }
            body.dark-mode.state-pause { background: #5c2000; }

            .container {
                background: white;
                padding: 40px;
                border-radius: 20px;
                box-shadow: 0 15px 35px rgba(0,0,0,0.2);
                width: 100%;
                max-width: 500px;
                text-align: center;
                transition: background 0.3s, box-shadow 0.3s;
            }
            
            h2 { color: #4a4a4a; font-size: 30px; margin-bottom: 10px; transition: color 0.3s; }
            
            /* 环形进度条容器 */
            .timer-wrapper {
                position: relative;
                width: 220px;
                height: 220px;
                margin: 20px auto;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            .progress-ring {
                position: absolute;
                top: 0;
                left: 0;
                transform: rotate(-90deg); /* 从顶部开始倒数 */
            }
            .progress-ring__circle-bg {
                stroke: #f0f2f5;
            }
            .progress-ring__circle {
                stroke: #ff5252; /* 默认专注红 */
                stroke-dasharray: 565.48; /* 2 * pi * 90 */
                stroke-dashoffset: 0;
                transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
            }
            
            #timer { 
                font-size: 55px; 
                margin: 0; 
                position: absolute; 
                z-index: 10; 
                color: #ff5252; 
                transition: color 0.5s ease;
                font-weight: bold;
            }

            button {
                width: 100%;
                padding: 15px;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                margin-top: 15px;
                transition: 0.3s;
            }
            button:hover { transform: translateY(-2px); opacity: 0.9; }
            button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
            
            .btn-group { display: flex; gap: 10px; margin-top: 15px; }
            .btn-group button { margin-top: 0; }
            
            .mode-btn { background-color: #2196F3; }
            .start-btn { background-color: #4CAF50; }
            .pause-btn { background-color: #ff9800; }
            .stop-btn { background-color: #f44336; }
            .nav-btn { background-color: #667eea; }
            
            .info { margin-top: 20px; color: #666; transition: color 0.3s; }
            a { text-decoration: none; }

            .theme-btn {
                position: absolute;
                top: 20px;
                right: 20px;
                width: auto;
                padding: 8px 15px;
                background-color: rgba(255, 255, 255, 0.2);
            }

            /* 深色模式容器适配 */
            body.dark-mode .container {
                background: #1e1e1e;
                box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            }
            body.dark-mode h2 { color: #e0e0e0; }
            body.dark-mode .info { color: #aaa; }
            body.dark-mode .theme-btn { background-color: #333; color: #e0e0e0; }
            body.dark-mode .progress-ring__circle-bg { stroke: #333; }
        </style>
    </head>

    <body class="state-focus">
        <button class="theme-btn" id="themeToggle" onclick="toggleTheme()">🌙 Dark</button>

        <div class="container">
            <h2>Pomodoro Timer</h2>

            <div class="timer-wrapper">
                <svg class="progress-ring" width="220" height="220">
                    <circle class="progress-ring__circle-bg" stroke-width="10" fill="transparent" r="90" cx="110" cy="110"/>
                    <circle class="progress-ring__circle" stroke-width="10" stroke-linecap="round" fill="transparent" r="90" cx="110" cy="110"/>
                </svg>
                <div id="timer">25:00</div>
            </div>

            <div class="btn-group">
                <button class="mode-btn" onclick="setMode(25, 'focus')">25m Focus</button>
                <button class="mode-btn" onclick="setMode(5, 'break')">5m Break</button>
                <button class="mode-btn" onclick="setMode('test', 'focus')">Test 5s</button>
            </div>

            <div class="btn-group">
                <button class="start-btn" id="startBtn" onclick="startTimer()">Start</button>
                <button class="pause-btn" id="pauseBtn" onclick="pauseTimer()">Pause</button>
                <button class="stop-btn" onclick="resetTimer()">Reset</button>
            </div>

            <div class="info">
                <p>Username: <strong>{{user}}</strong></p>
                <p>Current Points: <strong>{{points}}</strong></p>
            </div>

            <nav>
                <a href="/index">
                    <button class="nav-btn">Go Back</button>
                </a>
            </nav>
        </div>

        <form id="completeForm" action="/completed_pomodoro" method="POST" style="display:none;">
            <input type="hidden" name="duration" id="durationInput" value="25">
        </form>

        <script>
            let timer = null;
            let selectedDuration = 25; // 记录用于提交的分钟数
            let totalTime = 25 * 60;   // 总秒数，用于计算进度条
            let timeLeft = totalTime;
            let currentState = 'focus'; // 'focus', 'break', 'pause'

            const circle = document.querySelector('.progress-ring__circle');
            const circumference = 2 * Math.PI * 90; // 565.48

            document.addEventListener("DOMContentLoaded", () => {
                if (localStorage.getItem("flowcision-theme") === "dark") {
                    document.body.classList.add("dark-mode");
                    document.getElementById("themeToggle").innerText = "☀️ Light";
                }
                updateVisuals();
            });

            function toggleTheme() {
                document.body.classList.toggle("dark-mode");
                let isDark = document.body.classList.contains("dark-mode");
                localStorage.setItem("flowcision-theme", isDark ? "dark" : "light");
                document.getElementById("themeToggle").innerText = isDark ? "☀️ Light" : "🌙 Dark";
            }

            function setMode(value, state) {
                if (value === 'test') {
                    selectedDuration = 5;
                    totalTime = 5;
                } else {
                    selectedDuration = value;
                    totalTime = value * 60;
                }
                currentState = state;
                document.getElementById("durationInput").value = selectedDuration;
                resetTimer();
            }

            function updateVisuals() {
                // 1. 更新文字时间
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                document.getElementById("timer").innerText =
                    minutes + ":" + (seconds < 10 ? "0" : "") + seconds;

                // 2. 更新进度条位置
                let progress = timeLeft / totalTime;
                let offset = circumference - progress * circumference;
                circle.style.strokeDashoffset = offset;

                // 3. 更新颜色 (状态)
                document.body.classList.remove('state-focus', 'state-break', 'state-pause');
                
                let themeColor;
                if (currentState === 'pause') {
                    document.body.classList.add('state-pause');
                    themeColor = '#ff9800'; // 橙色
                } else if (currentState === 'break') {
                    document.body.classList.add('state-break');
                    themeColor = '#4CAF50'; // 绿色
                } else {
                    document.body.classList.add('state-focus');
                    themeColor = '#ff5252'; // 红色
                }

                circle.style.stroke = themeColor;
                document.getElementById("timer").style.color = themeColor;
            }

            function startTimer() {
                if (timer !== null) return;
                
                // 如果从暂停恢复，还原为其原本的状态颜色
                if (currentState === 'pause') {
                    currentState = selectedDuration === 5 && totalTime !== 5 ? 'break' : 'focus'; 
                }
                
                document.getElementById("startBtn").disabled = true;
                document.getElementById("pauseBtn").innerText = "Pause";
                updateVisuals();
                
                timer = setInterval(() => {
                    timeLeft--;
                    updateVisuals();

                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        timer = null;
                        // 倒计时结束时，如果是休息状态，不加分，只提示或刷新；如果是专注则提交加分
                        if (currentState === 'break') {
                            alert("Break is over! Ready to focus?");
                            setMode(25, 'focus');
                        } else {
                            document.getElementById("completeForm").submit();
                        }
                    }
                }, 1000);
            }

            function pauseTimer() {
                let pauseBtn = document.getElementById("pauseBtn");
                if (timer !== null) {
                    // 执行暂停
                    clearInterval(timer);
                    timer = null;
                    currentState = 'pause';
                    updateVisuals();
                    
                    pauseBtn.innerText = "Resume";
                    document.getElementById("startBtn").disabled = false;
                } else if (pauseBtn.innerText === "Resume") {
                    startTimer();
                }
            }

            function resetTimer() {
                clearInterval(timer);
                timer = null;
                timeLeft = totalTime;
                
                // 重置状态
                if (currentState === 'pause') {
                     currentState = totalTime === 300 && selectedDuration !== 5 ? 'break' : 'focus';
                }
                
                document.getElementById("startBtn").disabled = false;
                document.getElementById("pauseBtn").innerText = "Pause";
                updateVisuals();
            }
        </script>
    </body>
</html>
