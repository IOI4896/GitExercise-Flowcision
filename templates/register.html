<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowcision - Register</title>
    <style>
    
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        h2 { color: #4a4a4a; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        #warningBox {
        width: 500px;
        background: white;
        padding: 25px;
        border-radius: 10px;
        text-align: center;
        }
        #warningOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #warningOverlay.hidden {
            display: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { background-color: #5a67d8; }

        body.dark-mode {
                background: linear-gradient(135deg, #111324 0%, #1a1a2e 100%) !important;
                background-color: #1a1a2e !important;
                color: #ffffff !important;
            }
        body.dark-mode .container, 
        body.dark-mode .card, 
        body.dark-mode div[class*="card"], 
        body.dark-mode div[style*="background-color: white"],
        body.dark-mode div[style*="background: white"],
        body.dark-mode #warningBox,
        body.dark-mode table, body.dark-mode tr, body.dark-mode td, body.dark-mode th {
            background-color: #22254b !important;
            background: #22254b !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6) !important;
            border: none !important;
            color: #ffffff !important;
        }
        body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode h4,
        body.dark-mode p, body.dark-mode label, body.dark-mode span, 
        body.dark-mode b, body.dark-mode li {
            color: #ffffff !important;
        }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea {
            background-color: #2c305e !important;
            color: #ffffff !important;
            border: 1px solid #4a5199 !important;
        }
        body.dark-mode button, body.dark-mode .btn {
            background-color: #4f46e5 !important;
            color: white !important;
            border: none !important;
        }
        body.dark-mode button:hover, body.dark-mode .btn:hover {
            background-color: #4338ca !important;
        }
    </style>
</head>

    <body>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div id="error-toast" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background-color: #ff4d4f; color: white; padding: 16px 24px; border-radius: 12px; box-shadow: 0 8px 20px rgba(255, 77, 79, 0.3); z-index: 10000; text-align: center; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); opacity: 1;">
                    <div style="font-weight: bold; font-size: 16px; margin-bottom: 4px;">Login Failed</div>
                    <div style="font-size: 14px; opacity: 0.9;">{{ messages[0] }}</div>
                </div>
            {% endif %}
        {% endwith %}
        
        <div id="warningOverlay" class="hidden">
            <div id="warningBox">
                <h3>Security Warning</h3>
                <p>Your password appears to be weak. Weak passwords may be vulnerable to guessing attacks.</p>
                <button id="cancelBtn">Cancel</button>
                <button id="continueBtn">Continue Anyway</button>
            </div>
        </div>

        <div class="register-card">
            <h2>Flowcision - Register</h2>
            <form method = "post" id="registerForm">
                <input type = "text" name = "username" placeholder = "Username" required>
                <input type = "password" id="password" name = "password" placeholder = "Password" required>
                <button type = "submit">Register</button>
            </form>

            <nav>
                <a href = "/">
                    <button>Go Back</button>
                </a>
            </nav>
        </div>
        <script>
            setTimeout(() => {
                let toast = document.getElementById("error-toast");
                if (toast) {
                    toast.style.opacity = "0";
                    toast.style.transform = "translate(-50%, 20px)";
                    setTimeout(() => toast.remove(), 400);
                }
            }, 3000);

            document.getElementById("registerForm").addEventListener("submit", function(e){
                const password = document.getElementById("password").value;

                if (isWeakpassword(password)){
                    e.preventDefault();
                    showWarning();
                }
            })

            function showWarning(){
                document.getElementById("warningOverlay")
                .classList
                .remove("hidden");
            }

            document.getElementById("cancelBtn").addEventListener("click", function(){
                document.getElementById("warningOverlay")
                .classList
                .add("hidden");
            })

            document.getElementById("continueBtn").addEventListener("click", function(){
                document.getElementById("registerForm")
                .submit();
            })

            function isWeakpassword(password){
                let score = 0;

                if (password.length >= 8) score++;
                if (/[A-Z]/.test(password)) score++;
                if (/[0-9]/.test(password)) score++;
                if (/[^A-Za-z0-9]/.test(password)) score++;

                return score < 2;
            }

            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        </script>
    </body>
</html>
