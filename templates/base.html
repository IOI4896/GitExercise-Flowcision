<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
        <style>
         
            body {
                animation: fadeInSlideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            }

            @keyframes fadeInSlideUp {
                0% {
                    opacity: 0;
                    transform: translateY(15px);
                }
                100% {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body>
            <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 10000;">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="toast-msg {{ category }}" style="background: rgba(30,30,30,0.95); color: #fff; padding: 15px 25px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-family: sans-serif; animation: slideInRight 0.3s forwards;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        </div>
        <script>
           
            setTimeout(() => {
                document.querySelectorAll('.toast-msg').forEach(el => {
                    el.style.opacity = '0';
                    setTimeout(() => el.remove(), 300);
                });
            }, 3000);
        </script>
        {% block content %}
        {% endblock %}
        <script src="{{url_for('static', filename='js/command.js')}}"></script>

        <audio id="bgMusic" loop hidden></audio>

        {% if user %}
            <div id="tutorialOverlay" class="hidden">
                <div id="tutorialBox">
                    <h2 id="tutorialTitle"></h2>
                    <p id="tutorialText"></p>

                    <button id="tutorialNext">
                        Next
                    </button>
                </div>
            </div>
        {% else %}
            <br>
        {% endif %}
    </body>

    <script>
        const musicEnabled = Number("{{music_enabled}}");
        const musicTheme = "{{music_theme}}";
        const musicVolume = Number("{{music_volume}}");
        const audio = document.getElementById("bgMusic");

        const themeMap = {
            rain: "static/audio/rain.mp3.mpeg",
            ocean: "static/audio/ocean.mp3.mpeg",
            white_noise: "static/audio/white_noise.mp3.mpeg"
        };

        if(musicEnabled){
            audio.src = themeMap[musicTheme];
            audio.volume = musicVolume / 100;

            audio.play().catch(err => {
                console.log(err);
            });
        }

        if(musicTheme !== "none"){
            document.body.classList.add(musicTheme);
        }
        
        const tutorialCompleted = Number("{{tutorial_completed}}");

        const tutorialSteps = [
            {
                title: "Welcome",
                text: "Welcome to Flowcision!"
            },

            {
                title: "Simulation",
                text: "Predict your daily routine and study performance"
            },

            {
                title: "Planner",
                text: "Create your weekly schedule here, you can also customize your presets"
            },

            {
                title: "Pomodoro",
                text: "Earn points through focus sessions (Focus sessions with below 25 minutes or rest sessions had no point given)"
            },

            {
                title: "History",
                text: "View your simulation history"
            },

            {
                title: "Dashboard",
                text: "View your statistics and progress"
            },

            {
                title: "Settings",
                text: "Set to your preferences"
            }
        ];

        let currentStep = 0;
        function showTutorial() {
            if(currentStep >= tutorialSteps){
                return;
            }

            const step = tutorialSteps[currentStep];

            document.getElementById("tutorialTitle").textContent = step.title;
            document.getElementById("tutorialText").textContent = step.text;
        }

        if(tutorialCompleted === 0){
            document.getElementById("tutorialOverlay").classList.remove("hidden");

            showTutorial();
        } else {
            document.getElementById("tutorialOverlay").style.display = "none";
        }

        async function finishTutorial(){
            try {
                const res = await fetch("/complete_tutorial", {
                    method: "POST"
                });

                console.log("tutorial status: ", res.status);

            } catch (err) {
                console.log("tutorial fetch failed: ", err);
            }

            console.log("hidding overlay");
            document.getElementById("tutorialOverlay").style.display = "none";
        }

        document.getElementById("tutorialNext").addEventListener("click",
            function() {
                currentStep++;

                if(currentStep === tutorialSteps.length - 1){
                    document.getElementById("tutorialNext").textContent = "Finish";
                }

                if(currentStep >= tutorialSteps.length){
                    finishTutorial();
                    return;
                }

                showTutorial();
            }
        )
    </script>
</html>
