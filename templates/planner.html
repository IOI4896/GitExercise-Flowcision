<!DOCTYPE html>
<html>
    <head>
        <title>Flowcision - Weekly Planner</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                color: #333;
            }
            .container {
                background: white;
                padding: 40px;
                border-radius: 20px;
                box-shadow: 0 15px 35px rgba(0,0,0,0.2);
                width: 100%;
                max-width: 900px;
                text-align: center;
            }
            h1 { color: #4a4a4a; font-size: 30px; text-align: center; margin-bottom: 10px; }
            .custom-input {
                display: none;
                text-align: center;
            }
            button {
                width: 100%;
                padding: 15px;
                background-color: #667eea;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                margin-top: 25px;
                transition: 0.3s;
            }
            button:hover { background-color: #5a67d8; transform: translateY(-2px); }
        </style>
    </head>

    <body>
        <div class = "container">
            <h1>Weekly Planner</h1>

            <form method = "POST">
                <table border="1" style="margin: 0 auto; width: 80%;">
                    <tr>
                        <th>Day</th>
                        <th>Morning</th>
                        <th>Afternoon</th>
                        <th>Night</th>
                    </tr>

                    {% for day in days %}

                    <tr>
                        <td>{{day}}</td>

                        <td>
                            <select name = "{{day}}_morning" onchange = "toggleCustom(this, '{{day}}_morning_custom')">

                                {% for task in all_presets %}
                                    <option value = "{{task}}" {% if planner_data.get(day, {}).get('morning') == task %} selected {% endif %}>{{task}}</option>
                                {% endfor %}

                                <option value = "CUSTOM">Custom</option>

                            </select>

                            <input type = "text" name = "{{day}}_morning_custom" id = "{{day}}_morning_custom" class = "custom-input" placeholder = "Custom Task">
                        </td>

                        <td>
                            <select name = "{{day}}_afternoon" onchange = "toggleCustom(this, '{{day}}_afternoon_custom')">

                                {% for task in all_presets %}
                                    <option value = "{{task}}" {% if planner_data.get(day, {}).get('afternoon') == task %} selected {% endif %}>{{task}}</option>
                                {% endfor %}

                                <option value = "CUSTOM">Custom</option>

                            </select>

                            <input type = "text" name = "{{day}}_afternoon_custom" id = "{{day}}_afternoon_custom" class = "custom-input" placeholder = "Custom Task">
                        </td>

                        <td>
                            <select name = "{{day}}_night" onchange = "toggleCustom(this, '{{day}}_night_custom')">

                                {% for task in all_presets %}
                                    <option value = "{{task}}" {% if planner_data.get(day, {}).get('night') == task %} selected {% endif %}>{{task}}</option>
                                {% endfor %}

                                <option value = "CUSTOM">Custom</option>

                            </select>

                            <input type = "text" name = "{{day}}_night_custom" id = "{{day}}_night_custom" class = "custom-input" placeholder = "Custom Task">
                        </td>
                    </tr>

                    {% endfor %}

                </table>

                <button type = "submit">Save Planner</button>
            </form>

            <nav>
                <a href = "/">
                    <button>Go Back</button>
                </a>
            </nav>
        </div>

        <script>
            function toggleCustom(select, inputId) {
                let input = document.getElementById(inputId);

                if (select.value === "CUSTOM") {
                    input.style.display = "block"; 
                    input.style.margin = '0 auto'
                    input.focus(); 
                } else {
                    input.style.display = "none"; 
                    input.value = ""; 
                }
            }
        </script>
    </body>
</html>
