<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowcision - Login</title>
    <style>
       
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background 0.3s ease;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        h2 { color: #4a4a4a; margin-bottom: 5px; transition: color 0.3s ease; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { background-color: #5a67d8; }

      
        body.dark-mode {
            background: linear-gradient(135deg, #111324 0%, #1a1a2e 100%) !important;
            background-color: #1a1a2e !important;
        }
        body.dark-mode .login-card {
            background-color: #22254b !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6) !important;
        }
        body.dark-mode h2 {
            color: #ffffff !important;
        }
        body.dark-mode input {
            background-color: #2c305e !important;
            color: #ffffff !important;
            border: 1px solid #4a5199 !important;
        }
        body.dark-mode button {
            background-color: #4f46e5 !important;
        }
        body.dark-mode button:hover {
            background-color: #4338ca !important;
        }
    </style>
</head>
<body>
    <div id="theme-toggle-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
        <button id="dark-mode-btn" onclick="toggleDarkMode()" style="width: auto; background: #ffffff; color: #333333; border: 2px solid #667eea; padding: 10px 16px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 8px; font-family: Arial, sans-serif; margin-top: 0; transition: all 0.3s ease;">
            <span id="theme-icon">🌙</span> <span id="theme-text">Dark Mode</span>
        </button>
    </div>

    <div class="login-card">
        <h2>Flowcision - Login</h2>
        <form method = "post">
            <input type = "text" name = "username" placeholder = "Username" required>
            <input type = "password" name = "password" placeholder = "Password" required>
            <button type = "submit">Login</button>
        </form>

        <nav>
            <a href = "/">
                <button>Go Back</button>
            </a>
        </nav>
    </div>

    <script>
        function applyTheme(theme) {
            const btn = document.getElementById('dark-mode-btn');
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                if(icon) icon.innerText = '☀️';
                if(text) text.innerText = 'Light Mode';
                if(btn) {
                    btn.style.background = '#333333';
                    btn.style.color = '#ffffff';
                    btn.style.borderColor = '#ffffff';
                }
            } else {
                document.body.classList.remove('dark-mode');
                if(icon) icon.innerText = '🌙';
                if(text) text.innerText = 'Dark Mode';
                if(btn) {
                    btn.style.background = '#ffffff';
                    btn.style.color = '#333333';
                    btn.style.borderColor = '#667eea';
                }
            }
        }

        function toggleDarkMode() {
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'light');
                applyTheme('light');
            } else {
                localStorage.setItem('theme', 'dark');
                applyTheme('dark');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(savedTheme);
    </script>
</body>
</html>
