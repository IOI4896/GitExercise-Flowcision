<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flowcision - Air Combat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            overflow: hidden;
            touch-action: none;
            color: white;
            font-family: sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }

        #ui h2,
        #ui h3,
        #ui h4 {
            margin: 5px 0;
        }

        #gameover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 30px;
            border-radius: 10px;
            border: 2px solid white;
        }

        button {
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
            background: #00ff00;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }

        .buff-text {
            color: #ff00ff;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="game-nav" style="position: absolute; bottom: 20px; left: 20px; z-index: 100;">
        <a href="/pomodoro">
            <button class="nav-btn"
                style="padding: 10px 20px; font-size: 16px; cursor: pointer; background: #ff4444; color: white; border: none; border-radius: 5px; font-weight: bold;">Exit
                Game</button>
        </a>
    </div>
    <div id="ui">
        <h2>score: <span id="score">0</span></h2>
        <h3>Highest Score: <span id="highscore">0</span></h3>
        <h4 style="color:#ff4444">HP: <span id="lives">3</span></h4>
        <h4 style="color:#ffff00">Attack Speed: <span id="speedLvl">0</span>/5</h4>
        <h4 style="color:#00ffff">Bullet Stream: <span id="multiLvl">1</span>/3</h4>
        <div id="buffs" class="buff-text"></div>
    </div>
    <div id="gameover">
        <h1 style="color:red">Game Over</h1>
        <button onclick="startGame()">Restart</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let cw = canvas.width = window.innerWidth;
        let ch = canvas.height = window.innerHeight;

        let score = 0, highScore = 0;
        try {
            highScore = localStorage.getItem('planeGameHighScoreV5') || 0;
        } catch (e) {
            console.warn("Storage permissions are limited");
        }
        document.getElementById('highscore').innerText = highScore;

        let audioCtx;
        function initAudio() {
            try {
                if (!audioCtx && (window.AudioContext || window.webkitAudioContext)) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch (e) { }
        }

        function playSound(type) {
            if (!audioCtx || audioCtx.state !== 'running') return;
            try {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                let t = audioCtx.currentTime;
                if (type === 'shoot') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(800, t); osc.frequency.exponentialRampToValueAtTime(400, t + 0.1);
                    gain.gain.setValueAtTime(0.02, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                    osc.start(); osc.stop(t + 0.1);
                } else if (type === 'boom') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(10, t + 0.3);
                    gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
                    osc.start(); osc.stop(t + 0.3);
                } else if (type === 'powerup') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(400, t); osc.frequency.linearRampToValueAtTime(800, t + 0.2);
                    gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.2);
                    osc.start(); osc.stop(t + 0.2);
                } else if (type === 'hit') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(50, t + 0.15);
                    gain.gain.setValueAtTime(0.15, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
                    osc.start(); osc.stop(t + 0.15);
                } else if (type === 'warning') {
                    osc.type = 'square'; osc.frequency.setValueAtTime(300, t); osc.frequency.linearRampToValueAtTime(500, t + 0.8);
                    gain.gain.setValueAtTime(0.05, t); gain.gain.linearRampToValueAtTime(0.001, t + 0.8);
                    osc.start(); osc.stop(t + 0.8);
                }
            } catch (e) { }
        }

        let player, bullets, enemies, particles, blocks, boss;
        let frame = 0, isGameOver = false;
        let bossState = 0;
        let stateTimer = 600;
        let bossesKilled = 0, bigBossesKilled = 0;

        const BUFF_NAMES = ['Piercing Shot', 'Self-Repair Armor', 'Double Damage', 'Homing Missile', 'Astral Shield'];

        class Player {
            constructor() {
                this.w = 30; this.h = 40; this.x = cw / 2; this.y = ch - 80;
                this.cd = 0; this.lives = 3; this.speedLvl = 0; this.multiLvl = 1;
                this.invuln = 0; this.buffs = new Set(); this.healTimer = 0; this.homingTimer = 0;
                this.shieldAngle = 0;
                this.updateUI();
            }
            updateUI() {
                document.getElementById('lives').innerText = this.lives;
                document.getElementById('speedLvl').innerText = this.speedLvl;
                document.getElementById('multiLvl').innerText = this.multiLvl;
                let bText = ""; this.buffs.forEach(b => bText += BUFF_NAMES[b] + " ");
                document.getElementById('buffs').innerText = bText;
            }
            draw() {
                if (this.invuln > 0 && frame % 10 < 5) return;
                ctx.fillStyle = '#00ffff';
                ctx.beginPath(); ctx.moveTo(this.x, this.y - this.h / 2); ctx.lineTo(this.x + this.w / 2, this.y + this.h / 2); ctx.lineTo(this.x - this.w / 2, this.y + this.h / 2); ctx.fill();
                if (this.buffs.has(4)) {
                    ctx.strokeStyle = '#00ff00'; ctx.beginPath(); ctx.arc(this.x, this.y, 40, 0, Math.PI * 2); ctx.stroke();
                    let sx = this.x + Math.cos(this.shieldAngle) * 40, sy = this.y + Math.sin(this.shieldAngle) * 40;
                    ctx.fillStyle = '#00ff00'; ctx.beginPath(); ctx.arc(sx, sy, 8, 0, Math.PI * 2); ctx.fill();
                }
            }
            update() {
                if (this.invuln > 0) this.invuln--;
                this.shieldAngle += 0.1;
                if (this.buffs.has(1)) {
                    this.healTimer++;
                if (this.healTimer > 1800) { this.lives++; this.healTimer = 0; this.updateUI(); spawnText(this.x, this.y, "+1HP", "#ff0000"); playSound('powerup'); }
                }
                if (this.buffs.has(3)) {
                    this.homingTimer++;
                    if (this.homingTimer > 60) { bullets.push(new Bullet(this.x, this.y, -8, '#ff8800', true, 0, true)); this.homingTimer = 0; }
                }

                if (this.cd > 0) this.cd--;
                if (this.cd <= 0) {
                    let dmg = this.buffs.has(2) ? 2 : 1, pierce = this.buffs.has(0), spread = 0.2;
                    let startAngle = -Math.PI / 2 - (this.multiLvl - 1) * spread / 2;
                    for (let i = 0; i < this.multiLvl; i++) bullets.push(new Bullet(this.x, this.y - this.h / 2, -12, '#ffff00', true, startAngle + i * spread, false, dmg, pierce));
                    playSound('shoot');
                    this.cd = Math.floor(Math.max(10, 20 - this.speedLvl * 2));
                }
            }
            hit() {
                if (this.invuln > 0) return;
                this.lives--; this.invuln = 120; this.updateUI(); playSound('hit');
                if (this.lives <= 0) gameOver();
            }
        }

        class Bullet {
            constructor(x, y, speed, color, isPlayer, angle = -Math.PI / 2, isHoming = false, dmg = 1, pierce = false) {
                this.x = x; this.y = y; this.color = color; this.isPlayer = isPlayer;
                this.vx = Math.cos(angle) * Math.abs(speed); this.vy = Math.sin(angle) * Math.abs(speed);
                if (!isPlayer) { this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed; }
                this.r = isHoming ? 6 : 4; this.isHoming = isHoming; this.dmg = dmg; this.pierce = pierce; this.active = true;
            }
            draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill(); }
            update() {
                if (this.isHoming && this.isPlayer) {
                    let target = boss || enemies[0] || blocks[0];
                    if (target) {
                        let angle = Math.atan2(target.y - this.y, target.x - this.x);
                        this.vx = Math.cos(angle) * 8; this.vy = Math.sin(angle) * 8;
                    }
                }
                this.x += this.vx; this.y += this.vy;
            }
        }

        class Enemy {
            constructor(x, y, hp, size, speed) { this.x = x; this.y = y; this.hp = hp; this.size = size; this.speed = speed; }
            draw() { ctx.fillStyle = '#ff0044'; ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size); }
            update() { this.y += this.speed; }
        }

        class SpecialBlock {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.type = type;
                this.hp = 5; this.maxHp = 5; this.size = 40; this.vy = 1;
                this.labels = ["HP", "SPD", "BS"];
                this.colors = ["#ff4444", "#ffff00", "#00ffff"];
            }
            draw() {
                ctx.fillStyle = '#222';
                ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);
                ctx.strokeStyle = this.colors[this.type] || '#fff';
                ctx.lineWidth = 3;
                ctx.strokeRect(this.x - this.size / 2, this.y - this.size / 2, this.size, this.size);

                ctx.fillStyle = this.colors[this.type] || '#fff';
                ctx.font = "bold 24px sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.labels[this.type] || "?", this.x, this.y);

                ctx.fillStyle = 'red'; ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2 - 12, this.size, 6);
                ctx.fillStyle = '#00ff00'; ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2 - 12, this.size * (Math.max(0, this.hp) / this.maxHp), 6);
            }
            update() { this.y += this.vy; }
        }

        class Boss {
            constructor(isBig) {
                this.x = cw / 2; this.y = -100; this.isBig = isBig;
                this.size = isBig ? 120 : 70;
                this.maxHp = isBig ? 500 + bigBossesKilled * 100 : 100 + bossesKilled * 20;
                this.hp = this.maxHp; this.vx = (Math.random() > 0.5 ? 2 : -2) * (isBig ? 1.5 : 1);
                this.cd = 0; this.timer = 0;
                this.sides = 3 + Math.floor(Math.random() * 6); this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.bigType = isBig ? (bigBossesKilled % 5) : -1;
                this.atkSpeedModifier = isBig ? Math.min(10, bigBossesKilled) : 0;
                playSound('warning');
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                if (!this.isBig) {
                    ctx.fillStyle = this.color; ctx.beginPath();
                    for (let i = 0; i < this.sides; i++) {
                        let a = i * Math.PI * 2 / this.sides + this.timer * 0.02;
                        ctx.lineTo(Math.cos(a) * this.size / 2, Math.sin(a) * this.size / 2);
                    }
                    ctx.fill();
                } else {
                    ctx.fillStyle = '#aa00ff'; ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.beginPath();
                    if (this.bigType === 0) ctx.rect(-this.size / 2, -this.size / 3, this.size, this.size / 1.5);
                    else if (this.bigType === 1) for (let i = 0; i < 6; i++) ctx.lineTo(Math.cos(i * Math.PI / 3) * this.size / 2, Math.sin(i * Math.PI / 3) * this.size / 2);
                    else if (this.bigType === 2) { ctx.moveTo(0, this.size / 2); ctx.lineTo(this.size / 2, -this.size / 2); ctx.lineTo(-this.size / 2, -this.size / 2); }
                    else if (this.bigType === 3) { ctx.moveTo(0, -this.size / 2); ctx.lineTo(this.size / 4, 0); ctx.lineTo(0, this.size / 2); ctx.lineTo(-this.size / 4, 0); }
                    else for (let i = 0; i < 8; i++) ctx.lineTo(Math.cos(i * Math.PI / 4) * this.size / 2, Math.sin(i * Math.PI / 4) * this.size / 2);
                    ctx.fill(); ctx.stroke();
                    ctx.fillStyle = 'red'; ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI * 2); ctx.fill();
                }
                ctx.restore();
                ctx.fillStyle = 'red'; ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2 - 15, this.size, 6);
                ctx.fillStyle = '#00ff00'; ctx.fillRect(this.x - this.size / 2, this.y - this.size / 2 - 15, this.size * (Math.max(0, this.hp) / this.maxHp), 6);
            }
            update() {
                this.timer++;
                if (this.y < 120) this.y += 2;
                else {
                    this.x += this.vx;
                    if (this.x < this.size / 2 || this.x > cw - this.size / 2) this.vx *= -1;
                    this.cd--;
                    if (this.cd <= 0) {
                        let baseSpd = 5;
                        if (!this.isBig) {
                            bullets.push(new Bullet(this.x, this.y, baseSpd, '#ff00ff', false, Math.PI / 2)); this.cd = 50;
                        } else {
                            let fireDelay = Math.max(10, 60 - this.atkSpeedModifier * 4);
                            let angleToPlayer = Math.atan2(player.y - this.y, player.x - this.x);
                            switch (this.bigType) {
                                case 0: for (let i = -3; i <= 3; i++) if (Math.random() > 0.2) bullets.push(new Bullet(this.x + i * 20, this.y + this.size / 2, baseSpd, '#ff0000', false, Math.PI / 2)); this.cd = fireDelay * 1.5; break;
                                case 1: for (let i = 0; i < 4; i++) bullets.push(new Bullet(this.x, this.y, baseSpd, '#00ffff', false, this.timer * 0.1 + i * Math.PI / 2)); this.cd = fireDelay / 2; break;
                                case 2: for (let i = -2; i <= 2; i++) bullets.push(new Bullet(this.x, this.y, baseSpd + 2, '#ffff00', false, angleToPlayer + i * 0.15)); this.cd = fireDelay * 1.2; break;
                                case 3: bullets.push(new Bullet(this.x, this.y, baseSpd + 5, '#ffffff', false, angleToPlayer)); this.cd = fireDelay / 1.5; break;
                                case 4: enemies.push(new Enemy(this.x, this.y, 2, 20, 3)); this.cd = fireDelay * 1.5; break;
                            }
                        }
                    }
                }
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = (Math.random() - 0.5) * 10; this.vy = (Math.random() - 0.5) * 10; this.life = 1;
            }
            draw() { ctx.globalAlpha = this.life; ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, 4, 4); ctx.globalAlpha = 1; }
            update() { this.x += this.vx; this.y += this.vy; this.life -= 0.03; }
        }

        let floatingTexts = [];
        function spawnText(x, y, text, color) { floatingTexts.push({ x, y, text, color, life: 60 }); }
        function spawnParticles(x, y, color, amt = 15) { for (let i = 0; i < amt; i++) particles.push(new Particle(x, y, color)); }
        function checkColl(r1x, r1y, r1s, r2x, r2y, r2w, r2h) { return Math.abs(r1x - r2x) < r1s / 2 + r2w / 2 && Math.abs(r1y - r2y) < r1s / 2 + r2h / 2; }

        function gameOver() {
            isGameOver = true;
            if (score > highScore) {
                highScore = score;
                try { localStorage.setItem('planeGameHighScoreV5', highScore); } catch (e) { }
                document.getElementById('highscore').innerText = highScore;
            }
            document.getElementById('gameover').style.display = 'block';
        }

        function startGame() {
            initAudio();
            player = new Player(); bullets = []; enemies = []; particles = []; blocks = []; floatingTexts = []; boss = null;
            score = 0; frame = 0; isGameOver = false; bossState = 0; stateTimer = 600; bossesKilled = 0; bigBossesKilled = 0;
            document.getElementById('score').innerText = score; document.getElementById('gameover').style.display = 'none';
            loop();
        }

        function loop() {
            if (isGameOver) return;
            requestAnimationFrame(loop);
            ctx.clearRect(0, 0, cw, ch);

            ctx.fillStyle = 'white'; for (let i = 0; i < 5; i++) ctx.fillRect(Math.random() * cw, Math.random() * ch, 1.5, 1.5);

            frame++; player.update(); player.draw();

            let spawnRate = Math.max(20, 60 - bossesKilled * 5);
            if (frame % spawnRate === 0 && bossState !== 3 && bossState !== 0) {
                let s = 20 + Math.random() * 20;
                enemies.push(new Enemy(Math.random() * (cw - s) + s / 2, -s, s > 30 ? 3 : 1, s, s > 30 ? 2 : 4));
            }

            if (bossState === 0) {
                stateTimer--;
                ctx.fillStyle = "#fff"; ctx.font = "bold 30px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(`The game is about to start: ${Math.ceil(stateTimer / 60)}`, cw / 2, ch / 2);
                if (stateTimer <= 0) { bossState = 1; boss = new Boss(false); }
            } else if (bossState === 1 || bossState === 3) {
                if (boss) {
                    boss.update(); boss.draw();
                    if (checkColl(boss.x, boss.y, boss.size, player.x, player.y, player.w, player.h)) player.hit();
                    if (boss.hp <= 0) {
                        spawnParticles(boss.x, boss.y, '#fff', 50); playSound('boom');
                        score += boss.isBig ? 500 : 100;
                        if (boss.isBig) {
                            player.buffs.add(boss.bigType); player.updateUI();
                            spawnText(cw / 2, ch / 2, "Get Buff: " + (BUFF_NAMES[boss.bigType] || ""), "#ff00ff");
                            bigBossesKilled++;
                        }
                        bossesKilled++;
                        boss = null;
                        bossState = 2;
                        stateTimer = 300 + Math.floor(Math.random() * 300);
                    }
                }
            } else if (bossState === 2) {
                stateTimer--;
                ctx.fillStyle = "#ffaa00"; ctx.font = "bold 24px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(`Countdown to the next boss: ${Math.ceil(stateTimer / 60)}Sec`, cw / 2, ch / 2 - 50);
                ctx.fillStyle = "#ffffff"; ctx.font = "16px sans-serif";
                ctx.fillText(`(Break through special blocks to get upgrades!)`, cw / 2, ch / 2 - 20);

                if (stateTimer % 60 === 0) {
                    blocks.push(new SpecialBlock(Math.random() * (cw - 80) + 40, -40, Math.floor(Math.random() * 3)));
                }

                if (stateTimer <= 0) {
                    if (bossesKilled % 5 === 0 && bossesKilled > 0) { bossState = 3; boss = new Boss(true); }
                    else { bossState = 1; boss = new Boss(false); }
                }
            }

            if (player.buffs.has(4)) {
                let sx = player.x + Math.cos(player.shieldAngle) * 40, sy = player.y + Math.sin(player.shieldAngle) * 40;
                for (let i = enemies.length - 1; i >= 0; i--) {
                    if (checkColl(enemies[i].x, enemies[i].y, enemies[i].size, sx, sy, 16, 16)) {
                        spawnParticles(sx, sy, '#00ff00');
                        enemies[i].hp -= 5;
                        if (enemies[i].hp <= 0) { playSound('boom'); score += 10; enemies.splice(i, 1); }
                    }
                }
                for (let i = blocks.length - 1; i >= 0; i--) {
                    if (checkColl(blocks[i].x, blocks[i].y, blocks[i].size, sx, sy, 16, 16)) {
                        spawnParticles(sx, sy, '#00ff00');
                        blocks[i].hp -= 5;
                        if (blocks[i].hp <= 0) {
                            playSound('powerup');
                            if (blocks[i].type === 0) { player.lives++; spawnText(blocks[i].x, blocks[i].y, "+1HP", "#ff0000"); }
                            else if (blocks[i].type === 1) { if (player.speedLvl < 10) player.speedLvl++; spawnText(blocks[i].x, blocks[i].y, "Enhance Attack Speed", "#ffff00"); }
                            else if (blocks[i].type === 2) { if (player.multiLvl < 5) player.multiLvl++; spawnText(blocks[i].x, blocks[i].y, "Add Bullet Stream", "#00ffff"); }
                            player.updateUI(); blocks.splice(i, 1);
                        }
                    }
                }
                if (boss && checkColl(boss.x, boss.y, boss.size, sx, sy, 16, 16)) { boss.hp -= 0.5; spawnParticles(sx, sy, '#00ff00', 1); }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i]; e.update(); e.draw();
                if (checkColl(e.x, e.y, e.size, player.x, player.y, player.w, player.h)) { player.hit(); enemies.splice(i, 1); }
                else if (e.y > ch + e.size) enemies.splice(i, 1);
            }

            for (let i = blocks.length - 1; i >= 0; i--) {
                let b = blocks[i]; b.update(); b.draw();
                if (b.y > ch + b.size) blocks.splice(i, 1);
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                if (!b.active) { bullets.splice(i, 1); continue; }
                b.update(); b.draw();
                let hit = false;

                if (b.isPlayer) {
                    if (boss && checkColl(boss.x, boss.y, boss.size, b.x, b.y, b.r * 2, b.r * 2)) {
                        boss.hp -= b.dmg; hit = true; spawnParticles(b.x, b.y, '#ffff00');
                    } else {
                        for (let j = enemies.length - 1; j >= 0; j--) {
                            let e = enemies[j];
                            if (checkColl(e.x, e.y, e.size, b.x, b.y, b.r * 2, b.r * 2)) {
                                e.hp -= b.dmg; hit = true; spawnParticles(b.x, b.y, '#fff');
                                if (e.hp <= 0) { playSound('boom'); score += 10; enemies.splice(j, 1); }
                                break;
                            }
                        }
                        if (!hit || b.pierce) {
                            for (let j = blocks.length - 1; j >= 0; j--) {
                                let bk = blocks[j];
                                if (checkColl(bk.x, bk.y, bk.size, b.x, b.y, b.r * 2, b.r * 2)) {
                                    bk.hp -= b.dmg; hit = true; spawnParticles(b.x, b.y, '#00aaff');
                                    if (bk.hp <= 0) {
                                        playSound('powerup');
                                        if (bk.type === 0) {
                                            if (player.lives < 10) {
                                                player.lives++;
                                                spawnText(bk.x, bk.y, "+1HP", "#ff0000");
                                            } else {
                                                spawnText(bk.x, bk.y, "HP Full", "#ffffff");
                                            }
                                        }
                                        else if (bk.type === 1) { if (player.speedLvl < 5) player.speedLvl++; spawnText(bk.x, bk.y, "攻速升级", "#ffff00"); }
                                        else if (bk.type === 2) { if (player.multiLvl < 3) player.multiLvl++; spawnText(bk.x, bk.y, "弹道增加", "#00ffff"); }
                                        player.updateUI(); blocks.splice(j, 1);
                                    }
                                    break;
                                }
                            }
                        }
                    }
                } else {
                    if (checkColl(player.x, player.y, player.w * 0.6, b.x, b.y, b.r * 2, b.r * 2)) { player.hit(); hit = true; }
                }
                if ((hit && !b.pierce) || b.y < -50 || b.y > ch + 50 || b.x < -50 || b.x > cw + 50) b.active = false;
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.update(); p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let t = floatingTexts[i]; t.y -= 1; t.life--;
                ctx.globalAlpha = Math.max(0, t.life / 60); ctx.fillStyle = t.color; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(t.text, t.x, t.y); ctx.globalAlpha = 1;
                if (t.life <= 0) floatingTexts.splice(i, 1);
            }
            document.getElementById('score').innerText = score;
        }

        function movePlayer(e) {
            if (isGameOver) return;
            let cx = e.touches ? e.touches[0].clientX : e.clientX;
            let cy = e.touches ? e.touches[0].clientY : e.clientY;
            player.x = Math.max(player.w / 2, Math.min(cw - player.w / 2, cx));
            player.y = Math.max(player.h / 2, Math.min(ch - player.h / 2, cy));
        }

        window.addEventListener('mousemove', movePlayer);
        window.addEventListener('touchmove', e => { e.preventDefault(); movePlayer(e); }, { passive: false });
        window.addEventListener('resize', () => { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; });
        window.addEventListener('click', initAudio);
        window.addEventListener('touchstart', initAudio, { passive: true });

        startGame();
    </script>
</body>

</html>
