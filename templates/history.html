<!DOCTYPE html>
<html>
    <head>
        <title>Flowcision - History</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                color: #333;
            }
            .container {
                background: white;
                padding: 40px;
                border-radius: 20px;
                box-shadow: 0 15px 35px rgba(0,0,0,0.2);
                width: 100%;
                max-width: 900px;
                text-align: center;
            }
            h2 { color: #4a4a4a; font-size: 30px; text-align: center; margin-bottom: 10px; }
            b { color: #667eea; font-size: 24px; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-top: 20px; }
            p { font-size: 20px; }
            li { font-size: 20px; }
        
            button {
                width: 100%;
                padding: 15px;
                background-color: #667eea;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                margin-top: 25px;
                transition: 0.3s;
            }
            button:hover { background-color: #5a67d8; transform: translateY(-2px); }
        </style>
    </head>
    <body>
        <div class = "container">
            <h2>Your History</h2>

            {% if trend_chart_url %}
                <div style="margin: 20px 0;">
                    <img src="data:image/png;base64,{{ trend_chart_url }}" alt="History Trend Chart" style="max-width: 80%; height: auto; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                </div>
            {% endif %}
            
            <table border="1" style="margin: 0 auto; width: 80%;">
                <tr>
                    <th>Study</th>
                    <th>Sleep</th>
                    <th>Focus</th>
                    <th>Stress</th>
                    <th>Score</th>
                    <th>Date & Time</th>
                </tr>

                {% for record in data %}
                <tr>
                    <td>{{ record.study }}</td>
                    <td>{{ record.sleep }}</td>
                    <td>{{ record.focus }}</td>
                    <td>{{ record.stress }}</td>
                    <td>{{ record.score }}</td>
                    <td>{{ record.timestamp }}</td>
                </tr>
                {% endfor %}
            </table>

            <nav>
                <a href = "/">
                    <button>Go Back</button>
                </a>
            </nav>
        </div>
        <style>
    body.dark-mode {
        background: linear-gradient(135deg, #111324 0%, #1a1a2e 100%) !important;
        background-color: #1a1a2e !important;
        color: #ffffff !important;
    }
    body.dark-mode .container, 
    body.dark-mode .card, 
    body.dark-mode div[class*="card"], 
    body.dark-mode div[style*="background-color: white"],
    body.dark-mode div[style*="background: white"],
    body.dark-mode table, body.dark-mode tr, body.dark-mode td, body.dark-mode th {
        background-color: #22254b !important;
        background: #22254b !important;
        box-shadow: 0 15px 35px rgba(0,0,0,0.6) !important;
        border: none !important;
        color: #ffffff !important;
    }
    body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode h4,
    body.dark-mode p, body.dark-mode label, body.dark-mode span, 
    body.dark-mode b, body.dark-mode li {
        color: #ffffff !important;
    }
    body.dark-mode input, body.dark-mode select, body.dark-mode textarea {
        background-color: #2c305e !important;
        color: #ffffff !important;
        border: 1px solid #4a5199 !important;
    }
    body.dark-mode button, body.dark-mode .btn {
        background-color: #4f46e5 !important;
        color: white !important;
        border: none !important;
    }
    body.dark-mode button:hover, body.dark-mode .btn:hover {
        background-color: #4338ca !important;
    }
</style>

<script>
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    } else {
        document.body.classList.remove('dark-mode');
    }
</script>
    </body>
</html>
