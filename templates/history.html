<!DOCTYPE html>
<html>
    <head>
        <title>Flowcision - History</title>
    </head>

    <h2>Your History</h2>

    <table border = "1">
        <tr>
            <th>Study</th>
            <th>Sleep</th>
            <th>Focus</th>
            <th>Stress</th>
            <th>Score</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
        </tr>
        {% endfor %}
    </table>
</html>
