<!DOCTYPE html>
<html>
<head>
    <title>Study Analyzer - Flowcision</title>
    <style>
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }
        h1 { color: #4a4a4a; font-size: 24px; text-align: center; margin-bottom: 10px; }
        h2 { color: #667eea; font-size: 18px; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-top: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        
       
        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; 
            background-color: #f9f9f9;
        }
        
               button {
            width: 100%;
            padding: 15px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 25px;
            transition: 0.3s;
        }
        button:hover { background-color: #5a67d8; transform: translateY(-2px); }
    </style>
</head>

<body>
    <div class="container">
        <form action="/result" method="post">
            <h1>Scenario Context</h1>

            <label>Student Type: </label>
            <select name="student_type">
                <option value="default">Default</option>
                <option value="foundation">Foundation</option>
                <option value="diploma">Diploma</option>
                <option value="degree">Degree</option>
            </select>

            <h2>Enter Your Daily Data</h2>
            
            <label>Study Hours:</label>
            <input type="number" name="study">

            <label>Sleep Hours:</label>
            <input type="number" name="sleep">

            <label>Focus (0-10):</label>
            <input type="number" name="focus">

            <label>Stress (0-10):</label>
            <input type="number" name="stress">

            <button type="submit">Analyzer</button>
        </form>
    </div>
</body>
</html>
