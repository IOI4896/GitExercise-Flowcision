<!DOCTYPE html>
<html>
    <head>
        <title>Flowcision - Home Page</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                color: #333;
                transition: background 0.3s ease;
            }
            .container {
                background: white;
                padding: 40px;
                border-radius: 20px;
                box-shadow: 0 15px 35px rgba(0,0,0,0.2);
                width: 100%;
                max-width: 500px;
                transition: background-color 0.3s ease, box-shadow 0.3s ease;
            }
            h1 { color: #4a4a4a; font-size: 24px; text-align: center; margin-bottom: 10px; transition: color 0.3s ease; }
            b { color: #667eea; font-size: 18px; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-top: 20px; display: block; text-align: center; transition: color 0.3s ease, border-color 0.3s ease; }
            p { font-size: 30px; }

            button {
                width: 100%;
                padding: 15px;
                background-color: #667eea;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                margin-top: 25px;
                transition: 0.3s;
            }
            button1 {
                width: 100%;
                padding: 15px;
                background-color: #667eea;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                margin-top: 25px;
                transition: 0.3s;
            }
            button:hover { background-color: #5a67d8; transform: translateY(-2px); }
        </style>
    </head>

    <body>
        <div class="container">
            {% extends "base.html" %}
            {% block content %}
            <div id="cmdbar" class="hidden">
                <input id="commandInput" type="'text" placeholder="type command...">
            </div>
            <a href = "/settings">
                <button1>⚙️</button1>
            </a>

            {% if user %}
                <h1>Flowcision</h1>
            {% else %}
                <h1>Flowcision (Demo)</h1>
            {% endif %}

            <p></p>
            <b>A decision-based system for evaluating study routines.</b>
            <p></p>

            <nav>
            <a href = "/auth">
                {% if user %}
                    <button>Logout</button>
                {% else %}
                    <button>Login</button>
                {% endif %}
            </a>
            
            {% if not user %}
                <a href = "/register">
                    <button>Register</button>
                </a>
            {% endif %}
            
                <a href = "/index">
                    <button>Start Simulation</button>
                </a>

                <a href = "/planner">
                    <button>Weekly Planner</button>
                </a>

                <a href = "/history">
                    <button>View History</button>
                </a>

                <a href = "/dashboard">
                    <button>Dashboard</button>
                </a>

                <a href = "/market_research">
                    <button>Market Research</button>
                </a>
            </nav>
        </div>

        <style>
            body.dark-mode {
                background: linear-gradient(135deg, #111324 0%, #1a1a2e 100%) !important;
                background-color: #1a1a2e !important;
            }
            body.dark-mode .container, 
            body.dark-mode .login-card,
            body.dark-mode div[class*="card"], 
            body.dark-mode div[style*="background-color: white"],
            body.dark-mode div[style*="background: white"] {
                background-color: #22254b !important;
                background: #22254b !important;
                box-shadow: 0 15px 35px rgba(0,0,0,0.6) !important;
            }
            body.dark-mode h1, body.dark-mode h2, body.dark-mode h3, body.dark-mode h4,
            body.dark-mode p, body.dark-mode label, body.dark-mode span, 
            body.dark-mode b, body.dark-mode li, body.dark-mode td, body.dark-mode th {
                color: #ffffff !important;
            }
            body.dark-mode input, body.dark-mode select, body.dark-mode textarea {
                background-color: #2c305e !important;
                color: #ffffff !important;
                border: 1px solid #4a5199 !important;
            }
            body.dark-mode button, body.dark-mode .btn {
                background-color: #4f46e5 !important;
                color: white !important;
            }
            body.dark-mode button:hover, body.dark-mode .btn:hover {
                background-color: #4338ca !important;
            }
        </style>

        <div id="theme-toggle-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;">
            <button id="dark-mode-btn" onclick="toggleDarkMode()" style="width: auto; background: #ffffff; color: #333333; border: 2px solid #667eea; padding: 10px 16px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 8px; font-family: Arial, sans-serif; margin-top: 0; transition: all 0.3s ease;">
                <span id="theme-icon">🌙</span> <span id="theme-text">Dark Mode</span>
            </button>
        </div>

        <script>
            function applyTheme(theme) {
                const btn = document.getElementById('dark-mode-btn');
                const icon = document.getElementById('theme-icon');
                const text = document.getElementById('theme-text');
                
                if (theme === 'dark') {
                    document.body.classList.add('dark-mode');
                    if(icon) icon.innerText = '☀️';
                    if(text) text.innerText = 'Light Mode';
                    if(btn) {
                        btn.style.background = '#333333';
                        btn.style.color = '#ffffff';
                        btn.style.borderColor = '#ffffff';
                    }
                } else {
                    document.body.classList.remove('dark-mode');
                    if(icon) icon.innerText = '🌙';
                    if(text) text.innerText = 'Dark Mode';
                    if(btn) {
                        btn.style.background = '#ffffff';
                        btn.style.color = '#333333';
                        btn.style.borderColor = '#667eea';
                    }
                }
            }

            function toggleDarkMode() {
                if (document.body.classList.contains('dark-mode')) {
                    localStorage.setItem('theme', 'light');
                    applyTheme('light');
                } else {
                    localStorage.setItem('theme', 'dark');
                    applyTheme('dark');
                }
            }

            const savedTheme = localStorage.getItem('theme') || 'light';
            applyTheme(savedTheme);

            const HOTKEYS = {
                simulation: "{{simulation_hotkey or 'i'}}",
                pomodoro: "{{pomodoro_hotkey or 'p'}}",
                history: "{{history_hotkey or 'h'}}",
                dashboard: "{{dashboard_hotkey or 'd'}}",
                planner: "{{planner_hotkey or 'l'}}",
                settings: "{{settings_hotkey or 's'}}",
                back: "{{back_hotkey or 'z'}}"
            }
            document.addEventListener("keydown", 
                function(e){
                    try {
                        const tag = document.activeElement.tagName;
                        if(tag === "INPUT" ||
                            tag === "TEXTAREA" ||
                            tag === "SELECT"
                        ){ 
                            return;
                        };
                        const key = e.key.toLowerCase();
                        if(key === HOTKEYS.simulation.toLowerCase()){
                            window.location.href = "/index";
                        }
                        if(key === HOTKEYS.pomodoro.toLowerCase()){
                            window.location.href = "/pomodoro";
                        }
                        if(key === HOTKEYS.history.toLowerCase()){
                            window.location.href = "/history"
                        }
                        if(key === HOTKEYS.dashboard.toLowerCase()){
                            window.location.href = "/dashboard";
                        }
                        if(key === HOTKEYS.planner.toLowerCase()){
                            window.location.href = "/planner";
                        }
                        if(key === HOTKEYS.settings.toLowerCase()){
                            window.location.href = "/settings";
                        }

                        let secret = "";
                        document.addEventListener("keydown", function(e){
                            if(key === HOTKEYS.back.toLowerCase()){
                                secret += 1;
                                if(secret.length >= 9){
                                    window.location.href = "/backrooms";
                                }
                            }
                        })

                    } catch(err) {
                        console.error("Hotkey Error: ", err);
                    }
                }
            );
        </script>
        {% endblock %}
    </body>
</html>
