<!DOCTYPE html>
<html>
    <head>
        <title>Flowcision - Home Page</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
                color: #333;
                transition: background 0.3s ease;
            }
            .container {
                background: white;
                padding: 40px;
                border-radius: 20px;
                box-shadow: 0 15px 35px rgba(0,0,0,0.2);
                width: 100%;
                max-width: 500px;
                transition: background-color 0.3s ease, box-shadow 0.3s ease;
            }
            h1, h2 { color: #4a4a4a; font-size: 24px; text-align: center; margin-bottom: 10px; transition: color 0.3s ease; }
            b { color: #667eea; font-size: 18px; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-top: 20px; display: block; text-align: center; transition: color 0.3s ease, border-color 0.3s ease; }
            p { font-size: 30px; }

            button {
                width: 100%;
                padding: 15px;
                background-color: #667eea;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                margin-top: 25px;
                transition: 0.3s;
            }
            button1 {
                width: 100%;
                padding: 15px;
                background-color: #667eea;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
                font-weight: bold;
                margin-top: 25px;
                transition: 0.3s;
            }
            button:hover { background-color: #5a67d8; transform: translateY(-2px); }
        </style>
    </head>

    <body>
        <div class="container">
            {% extends "base.html" %}
            {% block content %}
            <div id="cmdbar" class="hidden">
                <input id="commandInput" type="'text" placeholder="type command...">
            </div>
            <a href = "/settings">
                <button1>⚙️</button1>
            </a>

            {% if user %}
                <h1>Flowcision</h1>
            {% else %}
                <h1>Flowcision (Demo)</h1>
            {% endif %}

            <p></p>
            <b>A decision-based system for evaluating study routines.</b>
            <p></p>

            <nav>
            <a href = "/auth">
                {% if user %}
                    <button>Logout</button>
                {% else %}
                    <button>Login</button>
                {% endif %}
            </a>
            
            {% if not user %}
                <a href = "/register">
                    <button>Register</button>
                </a>
            {% endif %}
            
                <a href = "/index" id="simulationBtn">
                    <button>Start Simulation</button>
                </a>

                <a href = "/planner" id="plannerBtn">
                    <button>Weekly Planner</button>
                </a>
